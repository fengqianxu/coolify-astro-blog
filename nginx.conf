server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── 压缩 ──────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    # ── 路由：Astro 纯静态 MPA ────────────────────────
    location / {
        try_files $uri $uri/index.html =404;
    }

    # ── Astro 构建产物长缓存（文件名带 hash，可放心 immutable） ─────────
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── 普通静态资源：中等缓存（文件名不一定带 hash，留条后路） ──
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # ── HTML 永远不缓存（但允许用 304 协商缓存） ──────
    #   每次都回源验证，保证发布后用户拿到最新 HTML；
    #   新 HTML 再引用带 hash 的新 bundle，自然刷到新字体/样式。
    location ~* \.html$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires 0;
    }
    location = / {
        add_header Cache-Control "no-cache, must-revalidate" always;
        expires 0;
    }

    # ── 安全头 ───────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # HSTS：生产 HTTPS 才生效（HTTP 下浏览器会忽略）。一年 + 子域名 + 允许预加载。
    #   Coolify/反向代理若配了 HTTPS 终止，请保留这行；若仍在纯 HTTP 试跑可先注释掉。
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Permissions-Policy：显式关掉一批用不到的强权限，减少指纹 / 误触发风险
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), fullscreen=(self)" always;

    # Content-Security-Policy：
    #   - 'unsafe-inline' 给 script：Layout 的主题恢复 is:inline 脚本 + HeroVideo 的 onclick
    #   - 'unsafe-inline' 给 style：Astro / Tailwind 会注入 <style>，动画 animation-delay 也是内联 style
    #   - cdn.jsdelivr.net / fonts.googleapis.com：LXGW / JetBrains Mono CSS
    #   - fonts.gstatic.com / cdn.jsdelivr.net：字体文件本体
    #   - data: / blob:：SVG 内联 + 将来可能的动态图像
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' data: https://cdn.jsdelivr.net https://fonts.gstatic.com; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

    # ── 自定义 404 ───────────────────────────────────
    error_page 404 /404.html;
}
